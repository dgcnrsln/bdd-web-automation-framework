name: Manual Rerun

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'rerun.txt dosyasinin cekilecegi CI run ID'
        required: true

jobs:
  rerun:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Download rerun.txt from selected run
        uses: actions/download-artifact@v4
        with:
          name: rerun-txt
          run-id: ${{ inputs.run_id }}
          path: target
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run only failed scenarios
        run: >
          mvn test
          -Dheadless=true
          -DsuiteXmlFile=src/test/resources/testng-rerun.xml

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-manual-rerun
          path: target/allure-results

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-manual-rerun
          path: target/site/allure-maven-plugin